# Ensures every push to master/main builds — catches failures that block Vercel production.
name: CI — Next.js build
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Large SSG (1600+ routes) + Next build can OOM on default Node heap in CI
      NODE_OPTIONS: --max-old-space-size=8192
      LEGACY_REPS_PUBLIC: '1'
      # `npm run start` / Lighthouse / Playwright run production mode — satisfy validateEnv()
      CRON_SECRET: 'ci-smoke-placeholder-not-for-production'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      # Use `npm install` (not `npm ci`) so CI tolerates platform-specific
      # optional dep drift in package-lock.json (e.g. `@emnapi/*` versions
      # resolved on Linux that differ from a Windows-generated lockfile).
      # Matches Vercel's install behaviour.
      - run: npm install --no-audit --no-fund --prefer-offline
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run build
      - name: Vitest unit tests
        run: npm test 2>&1 | tee vitest-unit.log
      - name: Reliability gate tests
        run: npm run test:reliability:ci
      - name: Repeat critical automation tests (20x)
        run: npm run test:automation:repeat
      - name: Firm outreach approval + send tests
        run: npm run test:firm-outreach:ci
      - name: Buffer scheduler unit tests and GBP image probe
        run: npm run test:buffer:ci
      - name: Custody discovery tests
        run: npm run test:custody-discovery:ci
      - name: Directory search engine self-test
        run: npm run test:directory-search
      - name: Lighthouse CI (tier-1 URLs, warn-only thresholds)
        run: npx lhci autorun
      - name: Blog SEO content rules
        run: npm run audit:blog-seo
      - name: Blog orphan link check
        run: npm run audit:blog-orphans
      - name: Cross-domain partner link check
        run: npm run audit:cross-domain-links
      - name: Partner UTM guard
        run: node scripts/audit/partner-utm-guard.mjs
      - name: Blog partner UTM guard
        run: node scripts/audit/blog-partner-utm.mjs
      - name: Blog JSON-LD shape check
        run: npm run validate:schema
      - name: Playwright smoke (local prod build)
        run: npm run test:ci:smoke
      - name: Live sitemap crawl (sample)
        # Tolerant of transient failures during parallel Vercel rollouts.
        env:
          CRAWL_MAX_URLS: '800'
          CRAWL_CONCURRENCY: '10'
          CRAWL_FAIL_THRESHOLD: '25'
        run: node scripts/audit/sitemap-crawl.mjs
      - name: CI test summary
        if: always()
        run: |
          echo "## CI test gate (SHA: ${GITHUB_SHA::7})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ job.status }}" = "success" ]; then
            echo "**Result: PASSED**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Result: FAILED**" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| tsc --noEmit | required |" >> "$GITHUB_STEP_SUMMARY"
          echo "| lint | required |" >> "$GITHUB_STEP_SUMMARY"
          echo "| build | required |" >> "$GITHUB_STEP_SUMMARY"
          echo "| vitest (npm test) | required |" >> "$GITHUB_STEP_SUMMARY"
          echo "| test:reliability:ci | required |" >> "$GITHUB_STEP_SUMMARY"
          echo "| test:automation:repeat (20x) | required |" >> "$GITHUB_STEP_SUMMARY"
          echo "| test:firm-outreach:ci | required |" >> "$GITHUB_STEP_SUMMARY"
          echo "| test:buffer:ci | required |" >> "$GITHUB_STEP_SUMMARY"
          echo "| test:custody-discovery:ci | required |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lighthouse CI | warn-only scores |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Playwright smoke | required |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f vitest-unit.log ]; then
            VITEST_LINE=$(grep -E 'Tests +[0-9]+ passed' vitest-unit.log | tail -1 || true)
            if [ -n "$VITEST_LINE" ]; then
              echo "**Vitest:** $VITEST_LINE" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Deploy to production runs only after this workflow succeeds (vercel-deploy-hook workflow_run)." >> "$GITHUB_STEP_SUMMARY"
