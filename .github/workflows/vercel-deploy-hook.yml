# Production deploy to Vercel on every push to master.
#
# Uses the Vercel CLI with VERCEL_TOKEN so the deploy always lands as
# Production on policestationrepuk-new (policestationrepuk.com / .org).
#
# Required repository secrets (GitHub → Settings → Secrets → Actions):
#   VERCEL_TOKEN       — https://vercel.com/account/tokens
#   VERCEL_ORG_ID      — team_wbvkpoLfvbg9qFwg5LqJLAjN
#   VERCEL_PROJECT_ID  — prj_lZ0zL8uq5cBDFosKovyF0n8FmlCn  (policestationrepuk-new)
name: Deploy to Vercel (production)
on:
  workflow_dispatch:
  push:
    branches: [master, main]

# Cancel any in-flight prod deploy if a newer commit lands.
concurrency:
  group: vercel-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # Remote build on Vercel — avoids uploading a large prebuilt artefact
      # (~170MB) which was failing with 5xx errors from the file-upload API.
      - name: Deploy to production
        run: |
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt/3"
            if vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Deploy failed; retrying in 30s..."
              sleep 30
            fi
          done
          exit 1

      - name: Post-deploy smoke
        if: success()
        run: |
          set -e
          for path in /api/health /api/ready / /directory /Register; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" "https://policestationrepuk.org${path}")
            echo "${path} → HTTP ${code}"
            if [ "$code" -ge 500 ]; then
              echo "Post-deploy smoke failed for ${path}"
              exit 1
            fi
          done
