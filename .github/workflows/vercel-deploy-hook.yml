# Production deploy to Vercel — only after CI passes on master/main.
#
# Uses the Vercel CLI with VERCEL_TOKEN so the deploy lands as
# Production on policestationrepuk-new (policestationrepuk.com / .org).
#
# Required repository secrets (GitHub → Settings → Secrets → Actions):
#   VERCEL_TOKEN       — https://vercel.com/account/tokens
#   VERCEL_ORG_ID      — team_wbvkpoLfvbg9qFwg5LqJLAjN
#   VERCEL_PROJECT_ID  — prj_lZ0zL8uq5cBDFosKovyF0n8FmlCn  (policestationrepuk-new)
name: Deploy to Vercel (production)
on:
  workflow_dispatch:
  workflow_run:
    workflows: ['CI — Next.js build']
    types: [completed]
    branches: [master, main]

# Cancel any in-flight prod deploy if a newer commit lands.
concurrency:
  group: vercel-prod
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: |
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt/3"
            if vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Deploy failed; retrying in 30s..."
              sleep 30
            fi
          done
          exit 1

      - name: Post-deploy smoke
        if: success()
        run: |
          set -e
          check_path() {
            path="$1"
            expected="$2"
            code=$(curl -sS -o /dev/null -w "%{http_code}" "https://policestationrepuk.org${path}")
            echo "${path} → HTTP ${code} (expected ${expected})"
            if [ "$code" != "$expected" ]; then
              echo "Post-deploy smoke failed for ${path}"
              exit 1
            fi
          }
          check_path /api/health 200
          check_path /api/ready 200
          check_path / 200
          check_path /directory 200
          check_path /Register 200
