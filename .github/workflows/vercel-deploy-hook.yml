# Production deploy to Vercel on every push to master.
#
# Replaces the previous deploy-hook approach (which produced Preview builds).
# This workflow uses the Vercel CLI directly with VERCEL_TOKEN so the deploy
# always lands as Production and updates policestationrepuk.org immediately.
#
# Required repository secrets:
#   VERCEL_TOKEN       — access token from https://vercel.com/account/tokens
#   VERCEL_ORG_ID      — team/account id (e.g. team_xxx)
#   VERCEL_PROJECT_ID  — project id (e.g. prj_xxx)
name: Deploy to Vercel (production)
on:
  workflow_dispatch:
  push:
    branches: [master, main]

# Cancel any in-flight prod deploy if a newer commit lands.
concurrency:
  group: vercel-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      # Vercel file-upload API occasionally returns 5xx mid-upload (~174MB artefact).
      - name: Deploy prebuilt to production
        run: |
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt/3"
            if vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Deploy failed; retrying in 30s..."
              sleep 30
            fi
          done
          exit 1
