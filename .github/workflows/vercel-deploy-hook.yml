# Production deploy to Vercel — only after CI passes on master/main.
#
# Vercel Deployment Checks gate production promotion on GitHub check results
# (CI "build", Site audit "audit"). This workflow does NOT run `vercel deploy
# --prod` (that hangs on BLOCKED deployments); it triggers a git-source build
# if needed, waits for promotion, then runs post-deploy smoke.
#
# Required repository secrets:
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
name: Deploy to Vercel (production)
on:
  workflow_dispatch:
  workflow_run:
    workflows: ['CI — Next.js build']
    types: [completed]
    branches: [master, main]

concurrency:
  group: vercel-prod
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_SCOPE: robert-cashmans-projects
      REPUK_REPO_ID: '1295786573'
    steps:
      - name: Resolve target SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "value=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Trigger or locate git production deployment
        id: deployment
        run: |
          set -euo pipefail
          SHA="${{ steps.sha.outputs.value }}"
          API="https://api.vercel.com"
          AUTH="Authorization: Bearer ${VERCEL_TOKEN}"

          find_url() {
            curl -sS "${API}/v6/deployments?projectId=${VERCEL_PROJECT_ID}&teamId=${VERCEL_ORG_ID}&limit=25" \
              -H "${AUTH}" \
              | jq -r --arg sha "$SHA" '.deployments[] | select(.meta.githubCommitSha == $sha) | .url' \
              | head -1
          }

          URL="$(find_url || true)"
          if [ -z "$URL" ]; then
            echo "No deployment for ${SHA}; triggering git production build"
            RESP=$(curl -sS -X POST "${API}/v13/deployments?teamId=${VERCEL_ORG_ID}" \
              -H "${AUTH}" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"policestationrepuk-new\",\"project\":\"${VERCEL_PROJECT_ID}\",\"target\":\"production\",\"gitSource\":{\"type\":\"github\",\"repoId\":${REPUK_REPO_ID},\"ref\":\"master\",\"sha\":\"${SHA}\"}}")
            echo "$RESP" | jq '{id, url, readyState}'
            URL=$(echo "$RESP" | jq -r '.url // empty')
            if [ -z "$URL" ]; then
              echo "Failed to trigger deployment"
              echo "$RESP"
              exit 1
            fi
          fi

          echo "url=https://${URL}" >> "$GITHUB_OUTPUT"
          echo "Deployment URL: https://${URL}"

      - name: Wait for deployment checks and promote
        run: |
          set -euo pipefail
          DEPLOY_URL="${{ steps.deployment.outputs.url }}"
          HOST="${DEPLOY_URL#https://}"
          API="https://api.vercel.com"
          AUTH="Authorization: Bearer ${VERCEL_TOKEN}"

          for i in $(seq 1 60); do
            STATE=$(curl -sS "${API}/v13/deployments/${HOST}?teamId=${VERCEL_ORG_ID}" \
              -H "${AUTH}" | jq -r '.readyState // "UNKNOWN"')
            echo "[$i/60] deployment state=${STATE}"
            if [ "$STATE" = "READY" ]; then
              echo "Deployment already promoted"
              exit 0
            fi
            if [ "$STATE" = "ERROR" ] || [ "$STATE" = "CANCELED" ]; then
              echo "Deployment failed with state=${STATE}"
              exit 1
            fi
            sleep 20
          done

          echo "Still blocked after wait — attempting explicit promote"
          vercel promote "$DEPLOY_URL" --yes --scope="$VERCEL_SCOPE" --timeout=15m --token="$VERCEL_TOKEN"

      - name: Wait for production health endpoints
        run: |
          set -euo pipefail
          WANT="${{ steps.sha.outputs.value }}"
          WANT_SHORT="${WANT:0:7}"
          for i in $(seq 1 40); do
            CODE=$(curl -sS -o /tmp/health.json -w "%{http_code}" "https://policestationrepuk.org/api/health" || echo "000")
            VER=$(jq -r '.version // empty' /tmp/health.json 2>/dev/null || true)
            echo "[$i/40] /api/health HTTP ${CODE} version=${VER} want=${WANT_SHORT}"
            if [ "$CODE" = "200" ] && [ "$VER" = "$WANT_SHORT" ]; then
              exit 0
            fi
            sleep 15
          done
          echo "Production health did not match target SHA in time"
          exit 1

      - name: Post-deploy smoke
        run: |
          set -e
          check_path() {
            path="$1"
            expected="$2"
            code=$(curl -sS -o /dev/null -w "%{http_code}" "https://policestationrepuk.org${path}")
            echo "${path} → HTTP ${code} (expected ${expected})"
            if [ "$code" != "$expected" ]; then
              echo "Post-deploy smoke failed for ${path}"
              exit 1
            fi
          }
          check_path /api/health 200
          check_path /api/ready 200
          check_path / 200
          check_path /directory 200
          check_path /Register 200
