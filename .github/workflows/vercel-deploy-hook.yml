# Production deploy to Vercel — MANUAL ONLY during stabilization.
#
# Requires explicit workflow_dispatch with the exact SHA to promote. Verifies
# CI and Site audit checks passed for that SHA before triggering a git-source
# production build. Does NOT auto-run on CI completion.
#
# Required repository secrets:
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
name: Deploy to Vercel (production)

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Exact git commit SHA to promote to production'
        required: true
        type: string
      confirm_production:
        description: 'Type PRODUCTION to confirm promotion'
        required: true
        type: string

permissions:
  checks: read
  contents: read

concurrency:
  group: vercel-prod
  cancel-in-progress: true

jobs:
  gate-checks:
    if: github.event.inputs.confirm_production == 'PRODUCTION'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Resolve and validate SHA
        id: resolve
        run: |
          set -euo pipefail
          SHA="${{ github.event.inputs.sha }}"
          if ! echo "$SHA" | grep -qE '^[0-9a-f]{40}$'; then
            echo "Invalid SHA format: $SHA (expected 40-char hex)"
            exit 1
          fi
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "Target SHA: ${SHA}"

      - name: Verify CI and Site audit passed for SHA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SHA="${{ steps.resolve.outputs.sha }}"
          API="https://api.github.com/repos/${{ github.repository }}/commits/${SHA}/check-runs?per_page=100"
          RESP=$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "$API")
          echo "$RESP" | jq -r '.check_runs[] | "\(.name)\t\(.conclusion)\t\(.status)"' | sort

          require_check() {
            local name="$1"
            local conclusion
            conclusion=$(echo "$RESP" | jq -r --arg n "$name" '.check_runs[] | select(.name == $n) | .conclusion' | head -1)
            if [ -z "$conclusion" ] || [ "$conclusion" = "null" ]; then
              echo "Missing required check: ${name}"
              exit 1
            fi
            if [ "$conclusion" != "success" ]; then
              echo "Required check ${name} conclusion=${conclusion} (expected success)"
              exit 1
            fi
            echo "OK: ${name} → ${conclusion}"
          }

          require_check "build"
          require_check "audit"

  deploy:
    needs: gate-checks
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_SCOPE: robert-cashmans-projects
    steps:
      - name: Install Vercel CLI (pinned)
        run: npm install -g vercel@41.4.0

      - name: Trigger or locate git production deployment
        id: deployment
        run: |
          set -euo pipefail
          SHA="${{ needs.gate-checks.outputs.sha }}"
          REPO_ID="${{ github.repository_id }}"
          API="https://api.vercel.com"
          AUTH="Authorization: Bearer ${VERCEL_TOKEN}"

          find_url() {
            curl -sS "${API}/v6/deployments?projectId=${VERCEL_PROJECT_ID}&teamId=${VERCEL_ORG_ID}&limit=25" \
              -H "${AUTH}" \
              | jq -r --arg sha "$SHA" '.deployments[] | select(.meta.githubCommitSha == $sha) | .url' \
              | head -1
          }

          URL="$(find_url || true)"
          if [ -z "$URL" ]; then
            echo "No deployment for ${SHA}; triggering git production build (repoId=${REPO_ID})"
            RESP=$(curl -sS -X POST "${API}/v13/deployments?teamId=${VERCEL_ORG_ID}" \
              -H "${AUTH}" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"policestationrepuk-new\",\"project\":\"${VERCEL_PROJECT_ID}\",\"target\":\"production\",\"gitSource\":{\"type\":\"github\",\"repoId\":${REPO_ID},\"ref\":\"master\",\"sha\":\"${SHA}\"}}")
            echo "$RESP" | jq '{id, url, readyState}'
            URL=$(echo "$RESP" | jq -r '.url // empty')
            if [ -z "$URL" ]; then
              echo "Failed to trigger deployment"
              echo "$RESP"
              exit 1
            fi
          fi

          echo "url=https://${URL}" >> "$GITHUB_OUTPUT"
          echo "Deployment URL: https://${URL}"

      - name: Wait for deployment checks and promote
        run: |
          set -euo pipefail
          DEPLOY_URL="${{ steps.deployment.outputs.url }}"
          HOST="${DEPLOY_URL#https://}"
          API="https://api.vercel.com"
          AUTH="Authorization: Bearer ${VERCEL_TOKEN}"

          for i in $(seq 1 60); do
            STATE=$(curl -sS "${API}/v13/deployments/${HOST}?teamId=${VERCEL_ORG_ID}" \
              -H "${AUTH}" | jq -r '.readyState // "UNKNOWN"')
            echo "[$i/60] deployment state=${STATE}"
            if [ "$STATE" = "READY" ]; then
              echo "Deployment promoted"
              exit 0
            fi
            if [ "$STATE" = "ERROR" ] || [ "$STATE" = "CANCELED" ]; then
              echo "Deployment failed with state=${STATE}"
              exit 1
            fi
            sleep 20
          done

          echo "Still blocked after wait — attempting explicit promote"
          vercel promote "$DEPLOY_URL" --yes --scope="$VERCEL_SCOPE" --timeout=15m --token="$VERCEL_TOKEN"

      - name: Wait for production health endpoints
        run: |
          set -euo pipefail
          WANT="${{ needs.gate-checks.outputs.sha }}"
          WANT_SHORT="${WANT:0:7}"
          for i in $(seq 1 40); do
            CODE=$(curl -sS -o /tmp/health.json -w "%{http_code}" "https://policestationrepuk.org/api/health" || echo "000")
            VER=$(jq -r '.version // empty' /tmp/health.json 2>/dev/null || true)
            echo "[$i/40] /api/health HTTP ${CODE} version=${VER} want=${WANT_SHORT}"
            if [ "$CODE" = "200" ] && [ "$VER" = "$WANT_SHORT" ]; then
              exit 0
            fi
            sleep 15
          done
          echo "Production health did not match target SHA in time"
          exit 1

      - name: Post-deploy smoke
        run: |
          set -e
          check_path() {
            path="$1"
            expected="$2"
            code=$(curl -sS -o /dev/null -w "%{http_code}" "https://policestationrepuk.org${path}")
            echo "${path} → HTTP ${code} (expected ${expected})"
            if [ "$code" != "$expected" ]; then
              echo "Post-deploy smoke failed for ${path}"
              exit 1
            fi
          }
          check_path /api/health 200
          check_path /api/ready 200
          check_path / 200
          check_path /directory 200
          check_path /Register 200
