name: Firm outreach production kick

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['CI — Next.js build']
    types: [completed]
    branches: [master]

jobs:
  should-kick:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect firm-outreach changes and auth
        id: check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          FIRM_OUTREACH_BOOTSTRAP_SECRET: ${{ secrets.FIRM_OUTREACH_BOOTSTRAP_SECRET }}
        run: |
          if [ -z "${VERCEL_TOKEN:-}" ] && [ -z "${CRON_SECRET:-}" ] && [ -z "${FIRM_OUTREACH_BOOTSTRAP_SECRET:-}" ]; then
            echo "No VERCEL_TOKEN or cron auth secrets — skipping kick"
            echo "run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SHA="${{ github.event.workflow_run.head_sha }}"
          git fetch origin "$SHA" --depth=2
          PARENT="$(git rev-parse "${SHA}^")"
          if git diff --name-only "$PARENT" "$SHA" | grep -qE '^(lib/firm-outreach|app/api/cron/firm-outreach|packages/firm-outreach-core|scripts/firm-outreach|\.github/workflows/firm-outreach-kick\.yml)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No firm-outreach changes in ${SHA} — skipping kick"
          fi

  kick:
    needs: should-kick
    if: needs.should-kick.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull production env
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ]; then
            vercel env pull .env.production --environment=production --yes --token=${{ secrets.VERCEL_TOKEN }}
          else
            echo "VERCEL_TOKEN not set — using GitHub secrets for cron auth only"
          fi

      - name: Requalify + enrich kick on production
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          FIRM_OUTREACH_BOOTSTRAP_SECRET: ${{ secrets.FIRM_OUTREACH_BOOTSTRAP_SECRET }}
        run: |
          set -a
          if [ -f .env.production ]; then
            # shellcheck disable=SC1091
            source .env.production
          fi
          set +a
          export FIRM_OUTREACH_KICK_BASE_URL="https://policestationrepuk.org"
          export VERCEL_TOKEN="${{ secrets.VERCEL_TOKEN }}"
          export FIRM_OUTREACH_KICK_COMMIT_SHA="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"
          node scripts/firm-outreach-production-kick.mjs
