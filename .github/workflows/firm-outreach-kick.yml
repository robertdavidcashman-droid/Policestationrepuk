name: Firm outreach production kick

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['CI — Next.js build']
    types: [completed]
    branches: [master]

jobs:
  kick:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull production env
        run: vercel env pull .env.production --environment=production --yes --token=${{ secrets.VERCEL_TOKEN }}

      - name: Requalify + enrich kick on production
        run: |
          set -a
          # shellcheck disable=SC1091
          source .env.production
          set +a
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "CRON_SECRET missing from Vercel production env — skip kick"
            exit 0
          fi
          AUTH="Authorization: Bearer ${CRON_SECRET}"
          BASE="https://policestationrepuk.org"
          kick() {
            local path="$1"
            local label="$2"
            echo "$label..."
            local resp code body
            resp=$(curl -sS -w "\n%{http_code}" -H "$AUTH" "${BASE}${path}")
            code=$(echo "$resp" | tail -1)
            body=$(echo "$resp" | sed '$d')
            echo "$body" | head -c 4000
            echo ""
            if [ "$code" != "200" ]; then
              echo "HTTP $code for ${path}"
              exit 1
            fi
          }
          kick "/api/cron/firm-outreach-bootstrap?requalifyOnly=1" "Requalify ready_to_send junk rows"
          kick "/api/cron/firm-outreach-bootstrap?batches=2&limit=60" "Run 2 enrich batches (limit=60)"
