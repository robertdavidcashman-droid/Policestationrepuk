# Site audit: runs the Playwright-based audit suite (links, article rendering,
# console/network, responsive, forms/CTAs, a11y, SEO) against a local production
# build of the Next.js app and uploads the report artifacts.
#
# Initially advisory (continue-on-error) on the master branch until the audit
# baseline is stable; promote to a required check via branch protection once green.
name: Site audit

on:
  workflow_dispatch:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

concurrency:
  group: site-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build app
        env:
          NEXT_TELEMETRY_DISABLED: '1'
        run: npm run build

      - name: Run site audit
        env:
          AUDIT_BASE_URL: http://127.0.0.1:3100
          NEXT_TELEMETRY_DISABLED: '1'
          CI: 'true'
        run: npm run audit:site

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-audit-reports
          path: |
            reports/site-audit.json
            reports/site-audit.md
            reports/broken-links.json
            reports/article-rendering-audit.json
            reports/playwright-audit.json
          if-no-files-found: warn
          retention-days: 14
