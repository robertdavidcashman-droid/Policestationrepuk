name: Custody official fetch

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  fetch-official-custody:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Fetch Devon and Cornwall custody numbers
        run: npx tsx scripts/fetch-devon-cornwall-custody.ts --write

      - name: Upload custody JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: custody-official-json
          path: |
            data/devon-cornwall-custody-numbers.json
            data/reports/devon-cornwall-custody-fetch.json
          if-no-files-found: warn

      - name: Summary
        run: |
          echo "Official custody JSON written. Download artifact and merge via seed-official-custody.ts or commit data/*.json after review."
