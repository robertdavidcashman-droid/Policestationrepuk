# Ops: reconnect web44ai (PSA) using team VERCEL_TOKEN from this repo.
name: Ops — PSA Vercel git link (web44ai)

on:
  workflow_dispatch:

jobs:
  link-and-deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: prj_XvBhew2OZV8JYpI2dNHDTD6P05Ai
    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Require Vercel token
        run: |
          if [ -z "${VERCEL_TOKEN}" ] || [ -z "${VERCEL_ORG_ID}" ]; then
            echo "VERCEL_TOKEN or VERCEL_ORG_ID missing on this repo"
            exit 1
          fi

      - name: Unlink old Git connection (All monorepo)
        run: |
          curl -sS -w "\nHTTP %{http_code}\n" -X DELETE \
            "https://api.vercel.com/v9/projects/web44ai/link?teamId=${VERCEL_ORG_ID}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" || true

      - name: Link robertdavidcashman-droid/policestationagent
        id: link
        continue-on-error: true
        run: |
          for body in \
            '{"type":"github","org":"robertdavidcashman-droid","repo":"policestationagent"}' \
            '{"type":"github","repo":"robertdavidcashman-droid/policestationagent"}'; do
            echo "Trying link body: $body"
            resp=$(curl -sS -w "\nHTTP %{http_code}\n" -X POST \
              "https://api.vercel.com/v9/projects/web44ai/link?teamId=${VERCEL_ORG_ID}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$body")
            echo "$resp"
            if echo "$resp" | tail -1 | grep -qE 'HTTP (200|201)'; then
              echo "linked=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "linked=false" >> "$GITHUB_OUTPUT"
          echo "Git link failed — Vercel GitHub app may need access to policestationagent repo"
          exit 1

      - name: Trigger production deploy from policestationagent main
        continue-on-error: true
        id: deploy
        env:
          PSA_REPO_ID: "1114666936"
        run: |
          resp=$(curl -sS -w "\nHTTP %{http_code}\n" -X POST \
            "https://api.vercel.com/v13/deployments?teamId=${VERCEL_ORG_ID}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"web44ai\",\"project\":\"${VERCEL_PROJECT_ID}\",\"target\":\"production\",\"gitSource\":{\"type\":\"github\",\"repoId\":${PSA_REPO_ID},\"ref\":\"main\"}}")
          echo "$resp"
          echo "$resp" | tail -1 | grep -qE 'HTTP (200|201)' || exit 1

      - name: Summarize
        if: always()
        run: |
          echo "Git link: ${{ steps.link.outcome }}"
          echo "Deploy trigger: ${{ steps.deploy.outcome }}"
          if [ "${{ steps.link.outcome }}" != "success" ] || [ "${{ steps.deploy.outcome }}" != "success" ]; then
            echo "Grant Vercel GitHub app access to robertdavidcashman-droid/policestationagent, then re-run this workflow."
          fi

      - name: Verify latest deployment repo
        run: |
          dep=$(curl -sS \
            "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&teamId=${VERCEL_ORG_ID}&limit=1" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}")
          echo "$dep" | jq -r '.deployments[0].meta | {githubRepo, githubCommitRef, githubCommitSha}'
